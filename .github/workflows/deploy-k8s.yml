name: Build & Deploy (k8s)

# Builds the ziy.one container, pushes to GHCR, and bumps the kustomize image
# tag so ArgoCD rolls it out. Runs only on app-source changes — the tag-bump
# commit touches infra/** and is excluded here to avoid a build loop.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/**'
      - '.github/workflows/deploy.yml'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: deploy-k8s
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/akz142857/ziyone-web:${{ steps.tag.outputs.sha }}
            ghcr.io/akz142857/ziyone-web:latest
          build-args: |
            ASTRO_BASE=/
            ASTRO_SITE=https://ziy.one
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump overlay image tag
        run: |
          sed -i "s|newTag: .*|newTag: ${{ steps.tag.outputs.sha }}|" \
            infra/k8s/overlays/prod/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/prod/kustomization.yaml
          git commit -m "chore(deploy): ziyone-web ${{ steps.tag.outputs.sha }}" \
            || { echo "no image change"; exit 0; }
          git push
