# Self-contained nginx config for the ziy.one static site container.
# Runs unprivileged (uid 101) with a read-only root filesystem, so every
# writable path is redirected under /tmp (mounted as an emptyDir in k8s).
worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # All temp paths must live on a writable volume (read-only rootfs).
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  sendfile      on;
  tcp_nopush    on;
  server_tokens off;
  keepalive_timeout 65;

  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_types        text/plain text/css application/javascript application/json
                    image/svg+xml application/xml font/woff2;

  server {
    listen      8080;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # Liveness/readiness probe target — never logged.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    # Content-hashed Astro assets: cache hard and forever.
    location /_astro/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Astro directory-format output: /works -> /works/index.html
    location / {
      try_files $uri $uri/ $uri.html =404;
    }
  }
}
